name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

      - name: Report lint-pr-title check on Release PR
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_SHA=$(gh pr view --repo "$GITHUB_REPOSITORY" "${{ fromJSON(steps.release.outputs.pr).number }}" --json headRefOid -q .headRefOid)
          gh api repos/$GITHUB_REPOSITORY/check-runs \
            --method POST \
            -f name="lint-pr-title" \
            -f head_sha="$PR_SHA" \
            -f status="completed" \
            -f conclusion="success" \
            -f "output[title]=PR title is valid" \
            -f "output[summary]=Release PR title follows Conventional Commits format"

      - name: Auto-merge Release PR
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER='${{ fromJSON(steps.release.outputs.pr).number }}'
          OUTPUT=$(gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" "$PR_NUMBER" 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -q "clean status"; then
              echo "PR already in clean status — merging directly"
              gh pr merge --squash --repo "$GITHUB_REPOSITORY" "$PR_NUMBER"
            else
              echo "$OUTPUT" && exit 1
            fi
          }

      - name: Wait for Release PR to merge then create tag and release
        if: ${{ steps.release.outputs.pr != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER='${{ fromJSON(steps.release.outputs.pr).number }}'
          echo "Waiting for Release PR #$PR_NUMBER to auto-merge..."
          for i in $(seq 1 18); do
            MERGE_SHA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json mergeCommit --jq '.mergeCommit.oid // ""')
            if [ -n "$MERGE_SHA" ]; then
              VERSION=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json title --jq '.title' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
              BODY=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body --jq '.body')
              gh api repos/$GITHUB_REPOSITORY/git/refs \
                --method POST \
                -f ref="refs/tags/v$VERSION" \
                -f sha="$MERGE_SHA"
              gh release create "v$VERSION" \
                --repo "$GITHUB_REPOSITORY" \
                --title "v$VERSION" \
                --target main \
                --notes "$BODY"
              gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
                --remove-label "autorelease: pending" \
                --add-label "autorelease: tagged"
              echo "Created release v$VERSION"
              exit 0
            fi
            echo "Attempt $i/18: not merged yet, waiting 10s..."
            sleep 10
          done
          echo "Timed out waiting for Release PR to merge"
          exit 1
